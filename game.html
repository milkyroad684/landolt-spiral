<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Landolt Spiral — 光学パズル</title>
<style>
:root {
  --bg: #f5f5f0;
  --panel: #ffffff;
  --fg: #232328;
  --muted: #6a6a6c;
  --accent: #2b6fb1;
  --good: #2d9d4e;
  --bad: #c4452f;
  --warn: #d18b1a;
  --border: #d8d8d2;
  --grid: #c5c5be;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16161a;
    --panel: #20202a;
    --fg: #eaeaea;
    --muted: #9a9a9c;
    --accent: #5fa8e8;
    --good: #5cc77a;
    --bad: #e07060;
    --warn: #f0b550;
    --border: #393940;
    --grid: #2e2e38;
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scrollbar-gutter: stable; }   /* スクロールバーの幅を常に確保し、出現/消失で盤面幅が変わらないようにする */
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
  min-height: 100vh;
}
.wrap {
  max-width: 600px;
  margin: 0 auto;
  padding: 12px 14px 32px;
}
header h1 {
  font-size: 18px;
  margin: 0 0 4px;
  letter-spacing: 0.02em;
}
header p {
  font-size: 12px;
  color: var(--muted);
  margin: 0 0 12px;
}
.stages {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}
.stages button {
  padding: 4px 10px;
  font-size: 12px;
  background: var(--panel);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  min-width: 32px;

  position: relative;
  background: var(--panel);
  border: 1px solid var(--border);

  display: block;
  width: 100%;
  height: auto;
  touch-action: none;

  display: flex;
  flex-direction: column;
  gap: 4px;

}

  display: grid;
  grid-template-columns: 44px 1fr 44px;

  display: flex;
  align-items: center;

  top: 8px; left: 8px; right: 8px;

<body>
<div class="wrap">
  <header>
    <h1>Landolt Spiral 光学パズル</h1>
    <p>視力検査のC字を拡大縮小すると、切れ目が螺旋状に回ります。光を眼まで導いてください。</p>
  </header>
  <nav class="stages" id="stages" aria-label="ステージ選択"></nav>
  <div class="board-wrap">
    <svg class="board" id="board" viewBox="0 0 640 640" preserveAspectRatio="xMidYMid meet" role="img" aria-label="光学パズル盤面"></svg>
    <div id="banner-area" role="status" aria-live="polite"></div>
  </div>
  <div id="ring-controls"></div>
  <div class="bottom-row">
    <button id="reset">リセット</button>
    <button id="hint">ヒント (自動探索)</button>
  </div>
  <p class="help">操作: 環をドラッグで大きさを変えるか、−／＋ボタンで 1px ずつ調整。中心から発射される光が外周の眼に当たればクリアです。</p>
  <div class="legend">
    <div class="row">
      <span class="item"><span class="sw" style="background:#888780"></span>吸収 (壁)</span>
      <span class="item"><span class="sw" style="background:#378ADD"></span>ミラー (反射)</span>
      <span class="item"><span class="sw" style="background:#BA7517"></span>プリズム (屈折)</span>
    </div>
    <div class="row" style="margin-top:4px; font-size:0.92em; opacity:0.85;">
      環は色で性質が分かります。内側半分と外側半分で色が違う環は、内面と外面で性質が変わります
      (例: 内プリズム・外ミラー)。色が1つなら内外とも同じ性質です。
      <span style="display:block; margin-top:2px;">白い目印で区切られた環は「セクター環」。区画ごと(半分ずつ)に性質が変わり、半径を変えると区画も回ります。</span>
    </div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   Landolt Spiral — Optical Puzzle
   単一HTML・依存なし・Vanilla JS + SVG
   設計仕様: HANDOFF.md §1〜§10
   実装上の調整:
   - STROKE_RATIO=0.25 (handoffの 0.4 → 視覚的に細く・5環ステージが収まる)
   - MARGIN=2 (handoffの 4)
   - RMIN=40, RMAX=260 (handoffの 48,255)
   - これらは「5環ステージが物理的に成立し」「プレイヤーに調整余地が残る」ための調整
   - GAP_HALF=11.5, BEAM_HALF=7, RB=290 は仕様通り
   - MAX_BOUNCE=11（曲げ/反射は最大10回。病的な多数回反射の解を自動排除）
   - ハーフミラー(H)・色フィルター(F)は廃止。光は常に白1本。
   - 環の種類は2文字コード [内面][外面]（各文字 A=吸収 / M=ミラー / P=プリズム）。
     例: AA=両面吸収(通常壁), MM=両面ミラー, PP=両面プリズム, AM=内吸収外ミラー(旧・片面ミラー),
         PM=内プリズム外ミラー, PA=内プリズム外吸収。delta は P 面の屈折量。
   ============================================================ */

// ----- 定数 -----
const CX = 320, CY = 320;
const GAP_HALF = 11.5;
const BEAM_HALF = 7;
const RMIN = 40, RMAX = 260;
const RB = 290;
const MARGIN = 2;
const STROKE_RATIO = 0.25;
const HALF_STROKE = STROKE_RATIO / 2;  // 0.125
// 光が「曲げ・反射」できる回数の上限。これを超えると光は消える(lost)。
// 10 回まで許可（11 回目で消える）。多数回バウンスの病的な解を自動的に排除し、
// 想定どおりの素直な解（通常 1〜3 回）だけが残るようにするための上限。
const MAX_BOUNCE = 11;
// 1 光線がリング境界を横切れる回数の上限（切れ目の素通りも数える）。
// MAX_BOUNCE とは別物で、素通りを多く含む素直な解が途中で打ち切られないよう余裕をもたせる。
const MAX_STEPS = 40;

// ----- カラー -----
// 環の面ごとの色（A=吸収/壁, M=ミラー, P=プリズム）。
// 環は2文字コード [内面][外面] で表すので、色も面単位で持つ。
const COLORS = {
  A: '#888780',        // 吸収（壁）
  M: '#378ADD',        // ミラー（反射）
  P: '#BA7517',        // プリズム（屈折）
  beam_white: '#f3d75e',
  absorb: '#e85a4f',   // 吸収マーク(×)の色
  target: '#2d9d4e',
};
// 1面の文字 → 色 / 不透明度（プリズム面はガラスっぽく半透明にする）。
function faceColor(ch) { return ch === 'M' ? COLORS.M : ch === 'P' ? COLORS.P : COLORS.A; }
function faceOpacity(ch) { return ch === 'P' ? 0.55 : 1; }

// ----- 数学ユーティリティ -----
function gapAngle(ring) {
  // r=0 ガード
  const r = Math.max(1, ring.r);
  return ring.t0 + ring.k * Math.log2(r / 100);
}
function normDiff(a, b) {
  return ((a - b) % 360 + 540) % 360 - 180;
}
function slackDeg(r, gapHalf) {
  const gh = gapHalf == null ? GAP_HALF : gapHalf;
  const s = Math.min(1, BEAM_HALF / Math.max(1, r));
  return Math.max(0, gh - Math.asin(s) * 180 / Math.PI);
}
// 切れ目の一覧を返す。各要素 {angle: 角度(度), half: 半角(度)}。
//  ring.gapOffsets : 各切れ目の基準角からのオフセット(度) … 相対角度を自由指定
//  ring.gaps       : 切れ目の個数（等間隔配置のショートカット）
//  ring.gapHalf    : 数値=全切れ目共通の半角 / 配列=切れ目ごとの半角（未指定は GAP_HALF）
// いずれも未指定なら従来どおり「半角 11.5 度・切れ目 1 個」。
function gapList(ring) {
  const base = gapAngle(ring);
  let offsets;
  if (Array.isArray(ring.gapOffsets)) {
    offsets = ring.gapOffsets;
  } else if (ring.gaps && ring.gaps > 1) {
    offsets = [];
    const sep = 360 / ring.gaps;
    for (let i = 0; i < ring.gaps; i++) offsets.push(i * sep);
  } else {
    offsets = [0];
  }
  const halfOf = (i) => {
    if (Array.isArray(ring.gapHalf)) return ring.gapHalf[i] == null ? GAP_HALF : ring.gapHalf[i];
    if (ring.gapHalf != null) return ring.gapHalf;
    return GAP_HALF;
  };
  return offsets.map((o, i) => ({ angle: base + o, half: halfOf(i) }));
}
// セクター環: ring.sectors = [{span:度, code:'[内面][外面]', delta?}]。境界は gapAngle(切れ目)を
// 起点に時計回りで割り当てる（半径を変えると切れ目もセクター境界も一緒に回る）。
// 与えた角度 phi(度) が属するセクターを返す。sectors が無い環では呼ばない。
function sectorAt(ring, phi) {
  const off = ((phi - gapAngle(ring)) % 360 + 360) % 360;
  let acc = 0;
  for (const s of ring.sectors) { acc += s.span; if (off < acc) return s; }
  return ring.sectors[ring.sectors.length - 1];
}
function rotateDir(d, deg) {
  const a = Math.atan2(d[1], d[0]) * 180 / Math.PI + deg;
  const ar = a * Math.PI / 180;
  return [Math.cos(ar), Math.sin(ar)];
}
function reflectDir(d, n) {
  const dp = d[0]*n[0] + d[1]*n[1];
  return [d[0] - 2*dp*n[0], d[1] - 2*dp*n[1]];
}
// 円との交点（最小 t > 0.5）
function circleHit(P, d, R) {
  const pd = P[0]*d[0] + P[1]*d[1];
  const pp = P[0]*P[0] + P[1]*P[1];
  const disc = pd*pd + R*R - pp;
  if (disc < 0) return Infinity;
  const s = Math.sqrt(disc);
  const t1 = -pd - s;
  const t2 = -pd + s;
  if (t1 > 0.5) return t1;
  if (t2 > 0.5) return t2;
  return Infinity;
}

// ----- 半径クランプ（隣接環との重なり防止）-----
function ringBounds(rings, i) {
  let lo = RMIN, hi = RMAX;
  if (i > 0) lo = Math.max(lo, ((1 + HALF_STROKE) * rings[i-1].r + MARGIN) / (1 - HALF_STROKE));
  if (i < rings.length - 1) hi = Math.min(hi, ((1 - HALF_STROKE) * rings[i+1].r - MARGIN) / (1 + HALF_STROKE));
  return { lo, hi };
}
function clampRing(rings, i, value) {
  const { lo, hi } = ringBounds(rings, i);
  if (lo > hi) return Math.max(RMIN, Math.min(RMAX, value));
  return Math.max(lo, Math.min(hi, value));
}

// ----- レイトレーサ（光線スタック方式）-----
function trace(stage, rings) {
  const allSegs = [];
  const allMarks = [];
  const finished = [];
  const stack = [{
    P: [0, 0],
    d: [0, -1],
    color: stage.source || 'white',
    bounces: 0,
  }];

  while (stack.length > 0) {
    const ray = stack.shift();
    let P = ray.P.slice();
    let d = ray.d.slice();
    let color = ray.color;
    let bounces = ray.bounces;
    let terminated = false;

    // 各光線を追跡（曲げ/反射は MAX_BOUNCE 回まで、境界横切りは MAX_STEPS 回まで）
    let step = 0;
    while (!terminated && step < MAX_STEPS) {
      step++;
      // 最近接交点を探す
      let bestT = Infinity, bestIdx = -1, isBoundary = false;
      for (let i = 0; i < rings.length; i++) {
        const t = circleHit(P, d, rings[i].r);
        if (t < bestT) { bestT = t; bestIdx = i; isBoundary = false; }
      }
      const tb = circleHit(P, d, RB);
      if (tb < bestT) { bestT = tb; isBoundary = true; }

      if (bestT === Infinity) {
        finished.push({ status: 'lost', color });
        terminated = true;
        break;
      }
      const Q = [P[0] + bestT*d[0], P[1] + bestT*d[1]];
      allSegs.push({ from: P.slice(), to: Q.slice(), color });

      if (isBoundary) {
        const phi = (Math.atan2(Q[1], Q[0]) * 180 / Math.PI + 360) % 360;
        const diff = Math.abs(normDiff(phi, stage.target));
        finished.push({
          status: diff <= stage.tol ? 'win' : 'miss',
          exit: phi,
          missBy: diff,
          color,
        });
        terminated = true;
        break;
      }

      const ring = rings[bestIdx];
      const phi = Math.atan2(Q[1], Q[0]) * 180 / Math.PI;
      // 複数の切れ目のいずれかに入っていれば「素通り」とみなす
      const inGap = gapList(ring).some(g => Math.abs(normDiff(phi, g.angle)) <= slackDeg(ring.r, g.half));
      const nrm = [Q[0]/ring.r, Q[1]/ring.r];

      if (inGap) {
        // 切れ目は最優先で素通り（内外どちらの面でも穴は穴）。
        P = Q;
      } else {
        // 環の種類は2文字コード [内面][外面]（各文字 A=吸収 / M=ミラー / P=プリズム）。
        // セクター環(sectors)では当たった角度の区画の code/delta を使う。それ以外は環全体の type/delta。
        let code = ring.type, delta = ring.delta;
        if (ring.sectors) { const sec = sectorAt(ring, phi); code = sec.code; delta = sec.delta; }
        // 法線 nrm は中心から外向き。d·nrm<0 は内向きに進んで当たった=外面ヒット → 外面の文字。
        // d·nrm>=0 は外向きに進んで当たった=内面ヒット → 内面の文字。
        const face = (d[0]*nrm[0] + d[1]*nrm[1] < 0) ? code[1] : code[0];
        if (face === 'A') {
          allMarks.push({ kind: 'absorb', x: Q[0], y: Q[1] });
          finished.push({ status: 'absorb', ringIdx: bestIdx, color });
          terminated = true;
        } else if (face === 'M') {
          d = reflectDir(d, nrm);
          allMarks.push({ kind: 'reflect', x: Q[0], y: Q[1] });
          P = Q; bounces++;
        } else if (face === 'P') {
          d = rotateDir(d, delta);
          allMarks.push({ kind: 'refract', x: Q[0], y: Q[1] });
          P = Q; bounces++;
        }
      }
      if (bounces >= MAX_BOUNCE) {
        if (!terminated) {
          finished.push({ status: 'lost', color });
          terminated = true;
        }
        break;
      }
    }
  }

  return { segs: allSegs, marks: allMarks, finished };
}

// ----- ステージ定義 -----
// 注: t0 は r=100px のときの切れ目角度 (度)
//     k は半径倍化あたりの切れ目回転角度 (度)
//     角度: 0=右, 90=下, 270=上 (SVG y下向き)
const STAGES = [
  {
    id: 1, name: "Stage 1 — はじめての光",
    hint: "両環の切れ目を真上 (270°) にそろえる。",
    target: 270, tol: 6, source: 'white',
    rings: [
      { type:'AA', k:90,  t0:270, r:60 },
      { type:'AA', k:120, t0:160, r:200 },
    ],
  },
  {
    id: 2, name: "Stage 2 — プリズム入門",
    hint: "内環で真上に通し、外プリズム本体に当てて右上へ屈折。",
    target: 289, tol: 4, source: 'white',
    rings: [
      { type:'AA', k:90,    t0:270,   r:60 },
      { type:'PP', delta:40, k:-120,  t0:171.4, r:200 },
    ],
  },
  {
    id: 3, name: "Stage 3 — ミラー入門",
    hint: "ミラーで折り返す。プリズムの本体に当てると曲がる。",
    target: 78, tol: 4, source: 'white',
    rings: [
      { type:'MM', k:-140, t0:45,  r:95 },
      { type:'AA', k:110,  t0:26,  r:150 },
      { type:'PP', delta:-50, k:200, t0:207, r:232 },
    ],
  },
  {
    id: 4, name: "Stage 4 — 屈折と反射",
    hint: "内側のミラーで光を折り返し、プリズムで曲げて、外環の切れ目から眼へ通す。",
    target: 69.1, tol: 10, source: 'white',
    rings: [
      { type:'MM', k:110,       t0:169.0, r:78,  gapHalf:16 },
      { type:'PP', delta:-30.5, k:-130,  t0:326.8, r:130, gapHalf:16 },
      { type:'AA', k:70,        t0:20.6,  r:210, gapHalf:16 },
    ],
    // solved: r=[61,105,167]（内ミラーで折返し→プリズム本体で屈折→外環の切れ目から眼）
  },
  {
    id: 5, name: "Stage 5 — プリズムとミラー",
    hint: "プリズムで曲げた光を、外側のミラーで反射させて眼へ届ける。",
    target: 75.6, tol: 8,
    rings: [
      { type:'PP', delta:-27.8, k:-80, t0:323.3, r:42, gapHalf:16 },
      { type:'MM', k:-90, t0:188.5, r:58, gapHalf:16 },
    ],
    // solved: r=[164,230]（プリズムで屈折→ミラーで反射→眼）
  },
  {
    id: 6, name: "Stage 6 — 2枚のミラー",
    hint: "プリズムで曲げ、2枚のミラーで反射をつないで角度を作る。",
    target: 349.4, tol: 8,
    rings: [
      { type:'PP', delta:69.4, k:-80, t0:334.2, r:59, gapHalf:16 },
      { type:'MM', k:-110, t0:6.9, r:140, gapHalf:16 },
      { type:'MM', k:110, t0:205.1, r:226, gapHalf:16 },
    ],
    // solved: r=[85,152,243]（プリズム→ミラー→ミラー）
  },
  {

// ----- 状態 -----
let currentStageIdx = 0;
let currentStage = null;
let selectedRingIdx = 0;
let opCount = 0;
let cleared = new Set();
let initialRings = null;

// 環の複製。入れ子（gapOffsets / gapHalf 配列）まで複製し、
// currentStage と initialRings・STAGES が同じ配列/オブジェクトを共有しないようにする。
// 現状は r しか書き換えないが、将来エディタ/自動生成で入れ子を触っても汚染しないため。
function cloneRing(r) {
  const c = { ...r };
  if (Array.isArray(r.gapOffsets)) c.gapOffsets = r.gapOffsets.slice();
  if (Array.isArray(r.gapHalf)) c.gapHalf = r.gapHalf.slice();
  if (Array.isArray(r.sectors)) c.sectors = r.sectors.map(s => ({ ...s }));
  return c;
}

function loadStage(idx) {
  currentStageIdx = idx;
  const s = STAGES[idx];
  currentStage = {
    ...s,
    rings: s.rings.map(cloneRing),
  };
  initialRings = s.rings.map(cloneRing);
  selectedRingIdx = 0;
  opCount = 0;
  hideWinBanner();
  render();
}

function resetStage() {
  currentStage.rings = initialRings.map(cloneRing);
  selectedRingIdx = 0;
  opCount = 0;
  hideWinBanner();
  render();
}

// ----- SVG 描画 -----
const NSVG = 'http://www.w3.org/2000/svg';

function ringPathD(cx, cy, r, gaps) {
  // gaps: [{angle, half}, ...]（度）。切れ目の隙間を除いた弧をすべて描く。
  const gs = gaps.map(g => ({ a: ((g.angle % 360) + 360) % 360, h: g.half })).sort((x, y) => x.a - y.a);
  let d = '';
  for (let i = 0; i < gs.length; i++) {
    const cur = gs[i];
    const next = gs[(i + 1) % gs.length];
    const start = cur.a + cur.h;             // この切れ目の終わり
    let end = next.a - next.h;               // 次の切れ目の始まり
    if (i === gs.length - 1) end += 360;      // 一周ぶん回り込む
    const sweep = end - start;
    if (sweep <= 0) continue;                 // 切れ目が重なる場合はその弧を描かない
    const a1 = start * Math.PI / 180, a2 = end * Math.PI / 180;
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    const large = sweep > 180 ? 1 : 0;
    d += `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r.toFixed(2)} ${r.toFixed(2)} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} `;
  }
  return d.trim();
}

function ringColor(ring) {
  // コントロール行の色見本(CSS background)用。両面同じなら1色、内外で違えば
  // 左=内面色 / 右=外面色 のグラデーションで「内外で性質が違う」ことを示す。
  if (ring.sectors) {
    // セクター環は区画ごとの代表色(外面)を等分グラデで並べる。
    const cols = ring.sectors.map(s => faceColor(s.code[1]));
    const n = cols.length;
    const stops = cols.map((c, i) => `${c} ${(100*i/n).toFixed(0)}% ${(100*(i+1)/n).toFixed(0)}%`).join(', ');
    return `linear-gradient(to right, ${stops})`;
  }
  const inner = faceColor(ring.type[0]);
  const outer = faceColor(ring.type[1]);
  if (ring.type[0] === ring.type[1]) return inner;
  return `linear-gradient(to right, ${inner} 50%, ${outer} 50%)`;
}
function rayColor() {
  // 光は常に白 1 本。
  return COLORS.beam_white;
}

function el(name, attrs) {
  const e = document.createElementNS(NSVG, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// 始点角 a0→終点角 a1(度) の弧のパス文字列（時計回り）。
function arcWindowD(cx, cy, r, a0, a1) {
  const large = (a1 - a0) > 180 ? 1 : 0;
  const x1 = cx + r*Math.cos(a0*Math.PI/180), y1 = cy + r*Math.sin(a0*Math.PI/180);
  const x2 = cx + r*Math.cos(a1*Math.PI/180), y2 = cy + r*Math.sin(a1*Math.PI/180);
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r.toFixed(2)} ${r.toFixed(2)} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}
// 角度範囲 [a0,a1] の弧片を、2文字コード code の内/外面色で描く（内外で違えば帯を半分に割る）。
function drawArcPiece(svg, ringIdx, a0, a1, code, r, sw) {
  const add = (radius, width, ch) => {
    const path = el('path', {
      d: arcWindowD(CX, CY, radius, a0, a1),
      fill: 'none', stroke: faceColor(ch), 'stroke-width': width.toFixed(2),
      'stroke-linecap': 'butt', 'stroke-opacity': faceOpacity(ch), 'data-ring': ringIdx,
    });
    path.style.cursor = 'pointer';
    svg.appendChild(path);
  };
  if (code[0] === code[1]) add(r, sw, code[0]);
  else { const h = sw/2; add(r - h/2, h, code[0]); add(r + h/2, h, code[1]); }
}
// セクター境界の目印（帯を横切る短い白線）。
function drawSectorTick(svg, ang, r, sw) {
  const ar = ang*Math.PI/180, c = Math.cos(ar), s = Math.sin(ar);
  const r0 = r - sw/2, r1 = r + sw/2;
  svg.appendChild(el('line', {
    x1:(CX+r0*c).toFixed(2), y1:(CY+r0*s).toFixed(2), x2:(CX+r1*c).toFixed(2), y2:(CY+r1*s).toFixed(2),
    stroke:'#fff', 'stroke-width':1.5, 'stroke-opacity':0.85,
  }));
}
// 通常環・セクター環を統一して描く。円周を「切れ目」と「セクター境界」で区切り、
// 区画ごとに色を変えて弧を描く。境界には目印を入れる。
function drawRing(svg, ring, i) {
  const sw = STROKE_RATIO * ring.r;
  const gaps = gapList(ring);
  const base = gapAngle(ring);
  const sectors = ring.sectors || [{ span: 360, code: ring.type, delta: ring.delta }];
  const inGapAt = (ang) => gaps.some(g => Math.abs(normDiff(ang, g.angle)) <= g.half);
  const codeAt = (ang) => {
    let off = ((ang - base) % 360 + 360) % 360, acc = 0;
    for (const s of sectors) { acc += s.span; if (off < acc) return s.code; }
    return sectors[sectors.length - 1].code;
  };
  // 切れ目の中心を一周の起点にすると、描画弧が 0°/360° の継ぎ目をまたがない。
  const start = gaps[0].angle;
  const STEP = 1.5;
  let runStart = null, runCode = null;
  const flush = (absEnd) => { if (runStart != null) { drawArcPiece(svg, i, runStart, absEnd, runCode, ring.r, sw); runStart = null; runCode = null; } };
  for (let a = 0; a <= 360 + 1e-6; a += STEP) {
    const ang = start + a;
    const code = inGapAt(((ang % 360) + 360) % 360) ? null : codeAt(ang);
    if (code !== runCode) { flush(ang); if (code != null) { runStart = ang; runCode = code; } }
  }
  flush(start + 360);
  // セクター境界の目印（切れ目内の境界は描かない）。
  if (ring.sectors && ring.sectors.length > 1) {
    let acc = 0;
    for (let s = 0; s < ring.sectors.length; s++) {
      const ba = base + acc; acc += ring.sectors[s].span;
      if (!inGapAt(((ba % 360) + 360) % 360)) drawSectorTick(svg, ba, ring.r, sw);
    }
  }
}

function render() {
  const svg = document.getElementById('board');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // 外周ガイド
  svg.appendChild(el('circle', {
    cx: CX, cy: CY, r: RB,
    fill: 'none', stroke: 'var(--grid)', 'stroke-width': 1,
    'stroke-dasharray': '3 5',
  }));

  // 的の許容弧
  const tStart = currentStage.target - currentStage.tol;
  const tEnd = currentStage.target + currentStage.tol;
  const tx1 = CX + RB * Math.cos(tStart * Math.PI / 180);
  const ty1 = CY + RB * Math.sin(tStart * Math.PI / 180);
  const tx2 = CX + RB * Math.cos(tEnd * Math.PI / 180);
  const ty2 = CY + RB * Math.sin(tEnd * Math.PI / 180);
  svg.appendChild(el('path', {
    d: `M ${tx1} ${ty1} A ${RB} ${RB} 0 0 1 ${tx2} ${ty2}`,
    fill: 'none',
    stroke: COLORS.target,
    'stroke-width': 7,
    'stroke-linecap': 'round',
    'stroke-opacity': 0.9,
  }));

  // 眼アイコン (的)
  const ex = CX + (RB + 16) * Math.cos(currentStage.target * Math.PI / 180);
  const ey = CY + (RB + 16) * Math.sin(currentStage.target * Math.PI / 180);
  svg.appendChild(el('circle', {
    cx: ex, cy: ey, r: 7,
    fill: 'none', stroke: COLORS.target, 'stroke-width': 1.5,
  }));
  svg.appendChild(el('circle', {
    cx: ex, cy: ey, r: 3,
    fill: COLORS.target,
  }));

  // レイトレース
  const traced = trace(currentStage, currentStage.rings);

  // 光線 (グロウ + コア)
  for (const seg of traced.segs) {
    svg.appendChild(el('line', {
      x1: CX + seg.from[0], y1: CY + seg.from[1],
      x2: CX + seg.to[0],   y2: CY + seg.to[1],
      stroke: rayColor(), 'stroke-width': 9,
      'stroke-opacity': 0.18, 'stroke-linecap': 'round',
    }));
    svg.appendChild(el('line', {
      x1: CX + seg.from[0], y1: CY + seg.from[1],
      x2: CX + seg.to[0],   y2: CY + seg.to[1],
      stroke: rayColor(), 'stroke-width': 1.8,
      'stroke-linecap': 'round',
    }));
  }

  // 環を描く（通常環・セクター環を統一処理）。
  for (let i = 0; i < currentStage.rings.length; i++) {
    drawRing(svg, currentStage.rings[i], i);
  }

  // 選択環ガイド
  if (currentStage.rings[selectedRingIdx]) {
    const r = currentStage.rings[selectedRingIdx].r;
    svg.appendChild(el('circle', {
      cx: CX, cy: CY, r,
      fill: 'none', stroke: 'var(--accent)',
      'stroke-width': 1, 'stroke-dasharray': '4 4',
      'stroke-opacity': 0.7,
    }));
  }

  // マーカー
  for (const m of traced.marks) {
    if (m.kind === 'absorb') {
      const g = el('g', { transform: `translate(${CX + m.x},${CY + m.y})` });
      g.appendChild(el('line', {
        x1: -5, y1: -5, x2: 5, y2: 5,
        stroke: COLORS.absorb, 'stroke-width': 2.5, 'stroke-linecap': 'round',
      }));
      g.appendChild(el('line', {
        x1: -5, y1: 5, x2: 5, y2: -5,
        stroke: COLORS.absorb, 'stroke-width': 2.5, 'stroke-linecap': 'round',
      }));
      svg.appendChild(g);
    } else {
      let col = COLORS.P;
      if (m.kind === 'reflect') col = COLORS.M;
      svg.appendChild(el('circle', {
        cx: CX + m.x, cy: CY + m.y, r: 4,
        fill: col, stroke: '#fff', 'stroke-width': 1,
      }));
    }
  }

  // 光源 (中心)
  svg.appendChild(el('circle', {
    cx: CX, cy: CY, r: 5,
    fill: COLORS.beam_white, stroke: '#444', 'stroke-width': 1,
  }));

  updateStatus(traced.finished);
  refreshControls();
  updateStageButtons();
}

// ドラッグ中の再描画を 1 フレームに 1 回へ間引く（pointermove の連続発火で描き過ぎない）。
let rafPending = false;
function scheduleRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; render(); });
}

function updateStatus(finished) {
  // 判定メッセージ(タイトル/サブタイトル)は表示しない。クリア時のみ「クリア!」帯を出す。
  const win = finished.find(f => f.status === 'win');
  if (win) {
    cleared.add(currentStage.id);
    showWinBanner();
  } else {
    hideWinBanner();
  }
}

function showWinBanner() {
  const area = document.getElementById('banner-area');
  if (area.dataset.shown === 'true') return;
  area.dataset.shown = 'true';
  area.innerHTML = '';
  const isLast = currentStageIdx >= STAGES.length - 1;
  const div = document.createElement('div');
  div.className = 'win-banner';
  if (isLast) {
    const span = document.createElement('span');
    span.textContent = '全ステージ制覇! お疲れさまでした';
    div.appendChild(span);
  } else {
    const span = document.createElement('span');
    span.textContent = 'クリア!';
    div.appendChild(span);
    const btn = document.createElement('button');
    btn.textContent = '次のステージへ ▶';
    btn.addEventListener('click', () => loadStage(currentStageIdx + 1));
    div.appendChild(btn);
  }
  area.appendChild(div);
}
function hideWinBanner() {
  const area = document.getElementById('banner-area');
  area.dataset.shown = 'false';
  area.innerHTML = '';
}

function faceName(ch) { return ch === 'M' ? 'ミラー' : ch === 'P' ? 'プリズム' : '吸収'; }
function codeName(code) {
  // 2文字コード [内面][外面] の表示名。両面同じなら短く、違えば「内◯・外◯」。
  if (code[0] === code[1]) return code[0] === 'A' ? '壁' : faceName(code[0]);
  return `内${faceName(code[0])}・外${faceName(code[1])}`;
}
function ringTypeLabel(r) {
  if (r.sectors) return 'セクター環[' + r.sectors.map(s => codeName(s.code)).join('/') + ']';
  if (r.type[0] === r.type[1]) return r.type[0] === 'A' ? '通常壁' : faceName(r.type[0]);
  return `内${faceName(r.type[0])}・外${faceName(r.type[1])}`;
}

// コントロール行は「ステージ読み込み時に一度だけ構築」し、以後は数値と選択状態のみ更新する。
// ドラッグ中に毎フレーム innerHTML を作り直す無駄（モバイルでの追従低下）を避けるため。
let controlsBuiltFor = -1;          // どのステージ用に行を構築済みか
let controlRefs = [];               // [{labelEl, txtNode}] 各行の更新対象への参照

function buildControls() {
  const wrap = document.getElementById('ring-controls');
  wrap.innerHTML = '';
  controlRefs = [];
  for (let i = 0; i < currentStage.rings.length; i++) {
    const ring = currentStage.rings[i];
    const row = document.createElement('div');
    row.className = 'ring-row';
    const minus = document.createElement('button');
    minus.textContent = '−';
    minus.setAttribute('aria-label', '環' + (i+1) + ' を小さく');
    minus.addEventListener('click', () => { selectedRingIdx = i; changeRing(-1); });
    const label = document.createElement('div');
    label.className = 'label';
    label.setAttribute('role', 'button');
    label.tabIndex = 0;                       // キーボードフォーカス可能
    const sw = document.createElement('span');
    sw.className = 'swatch';
    sw.style.background = ringColor(ring);   // 環の種類は固定なので一度だけ設定
    if (ring.type === 'PP') sw.style.opacity = '0.55';  // 両面プリズムはガラス感を出す
    const txtNode = document.createTextNode('');
    label.appendChild(sw);
    label.appendChild(txtNode);
    label.addEventListener('click', () => { selectedRingIdx = i; render(); });
    // キーボード操作: Enter/Space で選択、上下(左右)キーで 1px ずつ拡大縮小。
    label.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectedRingIdx = i; render(); }
      else if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { e.preventDefault(); selectedRingIdx = i; changeRing(+1); }
      else if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { e.preventDefault(); selectedRingIdx = i; changeRing(-1); }
    });
    const plus = document.createElement('button');
    plus.textContent = '＋';
    plus.setAttribute('aria-label', '環' + (i+1) + ' を大きく');
    plus.addEventListener('click', () => { selectedRingIdx = i; changeRing(+1); });
    row.appendChild(minus);
    row.appendChild(label);
    row.appendChild(plus);
    wrap.appendChild(row);
    controlRefs.push({ labelEl: label, txtNode });
  }
  controlsBuiltFor = currentStageIdx;
}

function refreshControls() {
  if (controlsBuiltFor !== currentStageIdx || controlRefs.length !== currentStage.rings.length) {
    buildControls();
  }
  for (let i = 0; i < currentStage.rings.length; i++) {
    const ring = currentStage.rings[i];
    const ref = controlRefs[i];
    const desc = '環' + (i+1) + ' ' + ringTypeLabel(ring) + ' / r=' + Math.round(ring.r);
    ref.txtNode.nodeValue = ' ' + desc;
    const sel = i === selectedRingIdx;
    ref.labelEl.classList.toggle('selected', sel);
    ref.labelEl.setAttribute('aria-pressed', sel ? 'true' : 'false');
    ref.labelEl.setAttribute('aria-label', desc + '。選択して上下キーで大きさを変更');
  }
}

function changeRing(delta) {
  const ring = currentStage.rings[selectedRingIdx];
  const newR = clampRing(currentStage.rings, selectedRingIdx, ring.r + delta);
  if (Math.abs(newR - ring.r) > 0.001) {
    ring.r = newR;
    opCount++;
    render();
  }
}

function updateStageButtons() {
  const nav = document.getElementById('stages');
  if (nav.children.length !== STAGES.length) {
    nav.innerHTML = '';
    for (let i = 0; i < STAGES.length; i++) {
      const b = document.createElement('button');
      b.textContent = String(i + 1);
      b.addEventListener('click', () => loadStage(i));
      nav.appendChild(b);
    }
  }
  for (let i = 0; i < STAGES.length; i++) {
    nav.children[i].classList.toggle('active', i === currentStageIdx);
    nav.children[i].classList.toggle('cleared', cleared.has(STAGES[i].id));
  }
}

// ----- 入力: ドラッグ -----
const svgRoot = document.getElementById('board');
let dragging = false;
let dragIdx = -1;
let dragOpAdded = false;
let dragRect = null;   // ドラッグ開始時の盤面位置を保持し、ドラッグ中は測り直さない

function svgPoint(e, rect) {
  rect = rect || svgRoot.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / rect.width * 640,
    y: (e.clientY - rect.top) / rect.height * 640,
  };
}

svgRoot.addEventListener('pointerdown', (e) => {
  const p = svgPoint(e);
  const dx = p.x - CX, dy = p.y - CY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  let bestI = -1, bestDiff = Infinity;
  for (let i = 0; i < currentStage.rings.length; i++) {
    const r = currentStage.rings[i].r;
    const half = STROKE_RATIO * r / 2 + 10;
    const diff = Math.abs(dist - r);
    if (diff <= half && diff < bestDiff) {
      bestDiff = diff; bestI = i;
    }
  }
  if (bestI >= 0) {
    dragging = true;
    dragIdx = bestI;
    dragOpAdded = false;
    selectedRingIdx = bestI;
    try { svgRoot.setPointerCapture(e.pointerId); } catch(_){}
    e.preventDefault();
    render();
    dragRect = svgRoot.getBoundingClientRect();   // 再描画後の位置を1回だけ測り、ドラッグ中は固定して使う
  }
});
svgRoot.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const p = svgPoint(e, dragRect);
  const dx = p.x - CX, dy = p.y - CY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const ring = currentStage.rings[dragIdx];
  const newR = clampRing(currentStage.rings, dragIdx, dist);
  if (Math.abs(newR - ring.r) >= 0.5) {
    ring.r = newR;
    if (!dragOpAdded) { opCount++; dragOpAdded = true; }
    scheduleRender();   // フレーム単位に間引いて再描画
  }
});
function endDrag(e) {
  if (dragging) {
    dragging = false; dragIdx = -1; dragRect = null;
    try { svgRoot.releasePointerCapture(e.pointerId); } catch(_){}
  }
}
svgRoot.addEventListener('pointerup', endDrag);
svgRoot.addEventListener('pointercancel', endDrag);
svgRoot.addEventListener('pointerleave', endDrag);

// ----- ボタン -----
document.getElementById('reset').addEventListener('click', resetStage);
document.getElementById('hint').addEventListener('click', () => {
  const btn = document.getElementById('hint');
  btn.disabled = true;
  btn.textContent = '計算中…';
  setTimeout(() => {
    try {
      const sol = solve(currentStage);
      if (sol) {
        for (let i = 0; i < sol.length; i++) currentStage.rings[i].r = sol[i];
        opCount++;
        render();
      } else {
        alert('解が見つかりませんでした。条件を見直してください。');
      }
    } finally {
      btn.disabled = false;
      btn.textContent = 'ヒント (自動探索)';
    }
  }, 30);
});

// ----- 自動ソルバ -----
// 「勝てる半径の組」を粗ステップで全部集め、最も素直な解
// （本体での 屈折/反射/分岐 の回数 bodyHits が最小の解）を返す。
// これにより、ヒントが跳ね回り(高バウンス)解ではなく意図された素直な経路を提示する。
function solve(stage) {
  const baseRings = stage.rings.map(r => ({ ...r }));
  const N = baseRings.length;

  function bodyHits(res) {
    return res.marks.filter(m => m.kind === 'refract' || m.kind === 'reflect').length;
  }

  // step 刻みで全組み合わせを走査し、勝てた組を {r, bh} で集める。
  function sweepWins(step) {
    const rings = baseRings.map(r => ({ ...r }));
    const wins = [];
    function rec(i) {
      if (i === N) {
        const res = trace({ ...stage, rings }, rings);
        if (res.finished.some(f => f.status === 'win')) {
          wins.push({ r: rings.map(r => r.r), bh: bodyHits(res) });
        }
        return;
      }
      let lo = RMIN;
      if (i > 0) lo = ((1 + HALF_STROKE) * rings[i-1].r + MARGIN) / (1 - HALF_STROKE);
      // 残り段の最大成長率で頭打ち
      const remaining = N - 1 - i;
      const minGrowth = (1 + HALF_STROKE) / (1 - HALF_STROKE);  // ≈ 1.286
      const maxR_for_chain = RMAX / Math.pow(minGrowth, remaining) + 5;
      const hi = Math.min(RMAX, maxR_for_chain);
      const start = Math.ceil(Math.max(lo, RMIN));
      for (let r = start; r <= hi; r += step) {
        rings[i].r = r;
        rec(i + 1);
      }
    }
    rec(0);
    return wins;
  }

  let wins = sweepWins(4);
  if (!wins.length) wins = sweepWins(3);  // 粗4で無ければ粗3で再探索
  if (!wins.length) return null;

  // 最も素直な解（bodyHits 最小）を選ぶ。粗探索の半径は整数で、その時点で
  // 既に有効な勝ち手なので追加の精密化は不要。
  wins.sort((a, b) => a.bh - b.bh);
  return wins[0].r.slice();
}

// ----- 自己検証 (起動時) -----
// 各ステージが「壊れていない」ことを実検証する。検証項目:
//   1. solvable     … solve() が解を見つけられる（クリア可能なステージである）
//   2. notPreSolved … 初期状態ではクリアしていない（自明ステージでない）
//   3. clampOK      … 初期半径がすべて可動域に収まっている（データ破損でない）
// 必須3項目のいずれかが NG なら、開発環境(file:///localhost)に限り画面へ警告を出す。
// 公開先（GitHub Pages 等）のプレイヤーには警告を出さない。
// 同じ検証はコマンドラインの `node _verify_stages.mjs` でも公開前に実行できる。
function selfTest() {
  console.log('=== Landolt Spiral self-test ===');
  const failed = [];
  for (let i = 0; i < STAGES.length; i++) {
    const stage = STAGES[i];
    const ringsInit = stage.rings.map(r => ({ ...r }));
    const initWin = trace(stage, ringsInit).finished.some(f => f.status === 'win');
    let clampOK = true;
    for (let j = 0; j < stage.rings.length; j++) {
      const { lo, hi } = ringBounds(stage.rings, j);
      if (stage.rings[j].r < lo - 0.5 || stage.rings[j].r > hi + 0.5) clampOK = false;
    }
    let solvable = false;
    try { solvable = !!solve(stage); } catch (e) { solvable = false; }

    const ok = solvable && !initWin && clampOK;
    const tags = [];
    if (!solvable) tags.push('解なし');
    if (initWin)   tags.push('初期クリア');
    if (!clampOK)  tags.push('クランプ違反');
    console.log(`Stage ${stage.id}: ${ok ? 'OK' : 'NG (' + tags.join(',') + ')'}`);
    if (!ok) failed.push({ id: stage.id, tags });
  }
  window.__selfTest = { failed, total: STAGES.length };
  if (failed.length) {
    console.error(`self-test FAIL: ${failed.length}/${STAGES.length} ステージに問題`, failed);
    showDevWarning(failed);
  } else {
    console.log(`self-test PASS: 全 ${STAGES.length} ステージ健全`);
  }
}

// 開発環境(file:///localhost)でのみ、壊れたステージの警告を画面に出す。
function isDevEnv() {
  const h = location.hostname;
  return location.protocol === 'file:' || h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0' || h === '';
}
function showDevWarning(failed) {
  if (!isDevEnv()) return;  // 公開先では何も出さない
  const box = document.createElement('div');
  box.setAttribute('role', 'alert');
  box.style.cssText = 'position:fixed;left:8px;right:8px;bottom:8px;z-index:9999;' +
    'background:#c4452f;color:#fff;padding:10px 12px;border-radius:6px;font-size:12px;' +
    'box-shadow:0 2px 10px rgba(0,0,0,.35);max-width:600px;margin:0 auto;';
  const lines = failed.map(f => `Stage ${f.id}: ${f.tags.join(', ')}`).join(' / ');
  box.textContent = `⚠ 自己検証 NG（開発環境のみ表示）: ${lines}`;
  document.body.appendChild(box);
}

// ----- 起動 -----
loadStage(0);
// 起動後にバックグラウンドで検証 (UIブロックしない)
setTimeout(selfTest, 100);
</script>
